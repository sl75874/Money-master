[alembic]
script_location = migrations

[loggers]
keys = root, sqlalchemny, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
type = stream
level = DEBUG
formatter = generic
args = []

[formatter_generic]
type = raw

[alembic:databases]
database_url = "sqlite:///your_database.db"